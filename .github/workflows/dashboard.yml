name: Build & Deploy Dashboard

# Triggers:
#   1. After "Update Bitcoin Reports" succeeds — daily fresh-data deploy.
#   2. On push to main when dashboard/ or csv/ changes — code/data edits.
#   3. Manual via the Actions tab.
on:
  workflow_run:
    workflows: ["Update Bitcoin Reports"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'csv/**'
      - '.github/workflows/dashboard.yml'
  workflow_dispatch:

# Cloudflare Pages deploy needs deployment write access on this repo.
permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    # If chained via workflow_run, only proceed when the upstream succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      # Pull the freshest CSVs from GitHub Pages instead of the local ../csv/.
      # This guarantees the deployed dashboard reflects the published data
      # exactly, regardless of what's currently committed in the repo.
      - name: Sync data from GitHub Pages
        working-directory: dashboard
        run: npm run sync:remote

      - name: Generate Evidence sources
        working-directory: dashboard
        run: npm run sources

      - name: Build static site
        working-directory: dashboard
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dashboard/build --project-name=secret-satoshis-dashboard --branch=main
